server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy API calls to the backend container (same-origin, no CORS
    # headaches). Matches docker-compose's service name `backend`.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE support for the realtime notification stream
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # SPA client-side routing — always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
