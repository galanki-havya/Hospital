name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend — install, schema check, syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Validate Prisma schema
        working-directory: backend
        run: npx prisma validate

      - name: Syntax-check all source files
        working-directory: backend
        run: find src prisma -name "*.js" -exec node --check {} \;

  frontend:
    name: Frontend — install, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true # surfaces warnings without blocking the build

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker images build cleanly
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t medicore-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t medicore-frontend:ci ./frontend
